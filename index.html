<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini-libreria — Settimana VII Giorno I</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
  </head>
  <body>

    <header class="site-header">
      <h1>La mia libreria</h1>
      <p>Aggiungi i tuoi libri e segnali come letti.</p>
    </header>

    <main class="container py-4">

      <section class="card p-4 mb-4">
        <h4 class="mb-3">Aggiungi un libro</h4>
        <form id="form-libro">
          <div class="mb-3">
            <label for="titolo" class="form-label fw-bold">Titolo</label>
            <input type="text" class="form-control" id="titolo" required>
          </div>
          <div class="mb-3">
            <label for="autore" class="form-label fw-bold">Autore</label>
            <input type="text" class="form-control" id="autore" required>
          </div>
          <div class="mb-3">
            <label for="anno" class="form-label fw-bold">Anno</label>
            <input type="number" class="form-control" id="anno" required>
          </div>
          <div class="mb-3">
            <label for="formato" class="form-label fw-bold">Formato</label>
            <select class="form-select" id="formato">
              <option value="cartaceo">Cartaceo</option>
              <option value="digitale">Digitale</option>
            </select>
          </div>
          <div class="mb-3" id="campo-dimensione" style="display:none">
            <label for="dimensione" class="form-label fw-bold">Dimensione (MB)</label>
            <input type="number" class="form-control" id="dimensione" step="0.1" min="0">
          </div>
          <button type="submit" class="btn btn-libreria">Aggiungi</button>
          <hr class="my-3">
          <div class="mb-0">
            <label for="ordinamento" class="form-label fw-bold">Ordina per</label>
            <select class="form-select" id="ordinamento">
              <option value="titolo">Titolo</option>
              <option value="autore">Autore</option>
              <option value="anno">Anno</option>
            </select>
          </div>
        </form>
      </section>

      <section>
        <div class="lista-header">
          <h2 id="titolo-lista">I tuoi libri (0)</h2>
          <button id="btn-svuota" class="btn btn-sm btn-outline-danger">Svuota tutto</button>
        </div>
        <div class="filtri mt-3">
          <button class="btn btn-sm btn-filtro active" data-filtro="tutti">Tutti</button>
          <button class="btn btn-sm btn-filtro" data-filtro="da-leggere">Da leggere</button>
          <button class="btn btn-sm btn-filtro" data-filtro="letti">Letti</button>
        </div>
        <ul id="lista-libri" class="list-unstyled mt-3">
          <!-- popolato da JavaScript -->
        </ul>
      </section>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/script.js"></script>
  </body>
</html>
